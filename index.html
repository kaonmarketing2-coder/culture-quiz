<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAON Culture Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --kaon-orange: #FF6B00;
    --kaon-dark: #1C1C1C;
    --kaon-gray: #3D3D3D;
    --kaon-light: #F5F5F0;
    --kaon-white: #FFFFFF;
    --correct: #2ECC71;
    --wrong: #E74C3C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--kaon-dark);
    color: var(--kaon-white);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── INTRO ── */
  #intro {
    background: var(--kaon-dark);
    position: relative;
    overflow: hidden;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  #intro::before {
    content: '';
    position: absolute; top: -200px; right: -200px;
    width: 600px; height: 600px; border-radius: 50%;
    background: var(--kaon-orange); opacity: 0.08;
    animation: pulse 4s ease-in-out infinite;
  }
  #intro::after {
    content: '';
    position: absolute; bottom: -150px; left: -150px;
    width: 400px; height: 400px; border-radius: 50%;
    background: var(--kaon-orange); opacity: 0.05;
    animation: pulse 4s ease-in-out infinite reverse;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .intro-badge {
    display: inline-block;
    border: 1px solid rgba(255,107,0,0.4);
    color: var(--kaon-orange);
    padding: 6px 18px;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 28px; position: relative; z-index: 1;
  }

  .intro-logo-img {
    position: relative; z-index: 1;
    width: clamp(200px, 40vw, 320px);
    margin-bottom: 16px;
      }

  .intro-subtitle {
    font-size: clamp(13px, 3vw, 16px);
    color: rgba(255,255,255,0.5);
    margin-top: 4px; letter-spacing: 1px; font-weight: 300;
    position: relative; z-index: 1;
  }

  .intro-divider {
    width: 60px; height: 2px; background: var(--kaon-orange);
    margin: 28px auto; position: relative; z-index: 1;
  }

  /* ── NAME INPUT ── */
  .name-section {
    position: relative; z-index: 1;
    max-width: 380px; width: 100%;
    margin: 0 auto 28px;
  }
  .name-label {
    display: block; font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.45); margin-bottom: 10px;
    text-transform: uppercase; text-align: left;
  }
  .name-input-wrap {
    position: relative;
  }
  .name-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,107,0,0.35);
    color: var(--kaon-white);
    padding: 14px 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px; font-weight: 500;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  .name-input::placeholder { color: rgba(255,255,255,0.25); }
  .name-input:focus {
    border-color: var(--kaon-orange);
    background: rgba(255,107,0,0.07);
  }
  .name-input-line {
    position: absolute; bottom: 0; left: 0;
    height: 2px; width: 0; background: var(--kaon-orange);
    transition: width 0.3s ease;
  }
  .name-input:focus ~ .name-input-line { width: 100%; }

  .intro-stats {
    display: flex; gap: 32px; justify-content: center;
    margin-bottom: 32px; position: relative; z-index: 1;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px; color: var(--kaon-orange); line-height: 1;
  }
  .stat-label {
    font-size: 11px; color: rgba(255,255,255,0.4);
    letter-spacing: 1px; margin-top: 4px;
  }

  .btn-start {
    background: var(--kaon-orange); color: var(--kaon-white);
    border: none; padding: 18px 56px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 3px; cursor: pointer;
    position: relative; z-index: 1; transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-start:hover { background: #FF8C33; transform: translateY(-2px); }
  .btn-start:disabled { background: #555; cursor: not-allowed; transform: none; }

  .btn-scoreboard {
    background: transparent; color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 28px; margin-top: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 2px; cursor: pointer;
    position: relative; z-index: 1; transition: all 0.2s;
  }
  .btn-scoreboard:hover { color: var(--kaon-orange); border-color: rgba(255,107,0,0.4); }

  /* ── QUIZ ── */
  #quiz { background: var(--kaon-light); color: var(--kaon-dark); }

  .quiz-header {
    background: var(--kaon-dark);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }

  .quiz-logo-img-small {
    height: 28px;   }

  .progress-wrap { flex: 1; max-width: 300px; margin: 0 24px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px;
  }
  .progress-bar {
    height: 3px; background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--kaon-orange);
    border-radius: 2px; transition: width 0.5s ease;
  }

  .quiz-player-score {
    text-align: right;
  }
  .quiz-player-name {
    font-size: 11px; color: rgba(255,255,255,0.4);
    letter-spacing: 1px; margin-bottom: 2px;
  }
  .score-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--kaon-orange); letter-spacing: 1px;
  }

  .quiz-body {
    flex: 1; padding: 32px 24px;
    max-width: 760px; margin: 0 auto; width: 100%;
  }

  .q-category {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 14px; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 20px; border-radius: 2px;
  }
  .cat-vision  { background: rgba(255,107,0,0.12); color: var(--kaon-orange); }
  .cat-value   { background: rgba(44,204,113,0.12); color: #27AE60; }
  .cat-culture { background: rgba(52,152,219,0.12); color: #2980B9; }
  .cat-scenario{ background: rgba(155,89,182,0.12); color: #8E44AD; }

  .q-number {
    font-family: 'Bebas Neue', sans-serif; font-size: 13px;
    letter-spacing: 2px; color: rgba(28,28,28,0.35); margin-bottom: 8px;
  }
  .q-text {
    font-size: clamp(17px, 3.5vw, 22px); font-weight: 700;
    line-height: 1.5; color: var(--kaon-dark); margin-bottom: 32px;
  }

  .options-grid { display: grid; gap: 12px; }

  .option-btn {
    background: var(--kaon-white); border: 2px solid transparent;
    padding: 18px 24px; text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 500; line-height: 1.5;
    color: var(--kaon-gray); cursor: pointer; transition: all 0.2s;
    display: flex; align-items: flex-start; gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: relative; overflow: hidden;
  }
  .option-btn::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--kaon-orange);
    transform: scaleY(0); transition: transform 0.2s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--kaon-orange); transform: translateX(4px);
    box-shadow: 0 4px 16px rgba(255,107,0,0.15);
  }
  .option-btn:hover:not(:disabled)::before { transform: scaleY(1); }
  .option-num {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px;
    color: var(--kaon-orange); min-width: 24px; line-height: 1.3;
  }
  .option-btn.correct {
    background: rgba(46,204,113,0.08); border-color: var(--correct);
    color: var(--kaon-dark);
  }
  .option-btn.correct::before { background: var(--correct); transform: scaleY(1); }
  .option-btn.wrong {
    background: rgba(231,76,60,0.06); border-color: var(--wrong);
    color: rgba(28,28,28,0.4);
  }
  .option-btn.wrong::before { background: var(--wrong); transform: scaleY(1); }
  .option-btn:disabled { cursor: default; }

  .feedback-box {
    margin-top: 24px; padding: 20px 24px;
    background: var(--kaon-white); border-left: 4px solid;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    animation: slideUp 0.3s ease;
  }
  .feedback-box.correct-fb { border-color: var(--correct); }
  .feedback-box.wrong-fb   { border-color: var(--wrong); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .feedback-title { font-size: 13px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
  .correct-fb .feedback-title { color: var(--correct); }
  .wrong-fb   .feedback-title { color: var(--wrong); }
  .feedback-text { font-size: 13px; line-height: 1.7; color: var(--kaon-gray); }
  .feedback-text strong { color: var(--kaon-orange); font-weight: 700; }

  .btn-next {
    display: block; width: 100%; margin-top: 24px;
    background: var(--kaon-dark); color: var(--kaon-white);
    border: none; padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-next:hover { background: var(--kaon-gray); }

  /* ── RESULT ── */
  #result {
    background: var(--kaon-dark);
    align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center;
    position: relative; overflow: hidden;
  }

  .result-player-name {
    font-size: 12px; letter-spacing: 3px;
    color: rgba(255,255,255,0.35); text-transform: uppercase;
    margin-bottom: 4px;
  }
  .result-player-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; color: var(--kaon-orange);
    letter-spacing: 1px; margin-bottom: 28px;
  }

  .result-ring { position: relative; width: 180px; height: 180px; margin: 0 auto 36px; }
  .result-ring svg { transform: rotate(-90deg); }
  .result-ring-bg { stroke: rgba(255,255,255,0.08); }
  .result-ring-fill {
    stroke: var(--kaon-orange); stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
  }
  .result-ring-label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); text-align: center;
  }
  .result-percent { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--kaon-white); line-height: 1; }
  .result-percent-sym { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--kaon-orange); }
  .result-correct-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; letter-spacing: 1px; }

  .result-grade {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 9vw, 64px);
    letter-spacing: 2px; line-height: 1; margin-bottom: 12px;
  }
  .result-message {
    font-size: 14px; color: rgba(255,255,255,0.55);
    line-height: 1.8; max-width: 360px; margin: 0 auto 36px;
    white-space: pre-line;
  }

  .result-breakdown {
    display: flex; gap: 16px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 32px;
  }
  .breakdown-item {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 16px 24px; min-width: 100px; text-align: center;
  }
  .breakdown-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; }
  .breakdown-num.ok { color: var(--correct); }
  .breakdown-num.no { color: var(--wrong); }
  .breakdown-label { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 4px; letter-spacing: 1px; }

  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .btn-retry {
    background: var(--kaon-orange); color: var(--kaon-white);
    border: none; padding: 16px 40px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px; cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-retry:hover { background: #FF8C33; transform: translateY(-2px); }

  .btn-to-score {
    background: transparent; color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 16px 40px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-to-score:hover { color: var(--kaon-white); border-color: rgba(255,255,255,0.5); }

  /* ── SCOREBOARD ── */
  #scoreboard {
    background: var(--kaon-dark);
    align-items: center;
    padding: 0 0 60px;
    min-height: 100vh;
  }

  .sb-header {
    background: var(--kaon-dark);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    width: 100%; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .sb-logo { height: 26px; }

  .sb-title-wrap { flex: 1; text-align: center; }
  .sb-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 4px; color: var(--kaon-white);
  }
  .sb-subtitle {
    font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.3); margin-top: 2px;
  }

  .btn-back {
    background: transparent; color: rgba(255,255,255,0.4);
    border: none; font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; cursor: pointer; transition: color 0.2s;
    padding: 4px 0;
  }
  .btn-back:hover { color: var(--kaon-white); }

  .sb-body { max-width: 640px; width: 100%; padding: 32px 24px 0; margin: 0 auto; }

  .sb-empty {
    text-align: center; padding: 80px 0;
    color: rgba(255,255,255,0.25); font-size: 14px; line-height: 1.8;
  }
  .sb-empty-icon { font-size: 48px; margin-bottom: 16px; }

  .sb-filters {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .sb-filter-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.45); padding: 6px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 1px; cursor: pointer;
    transition: all 0.15s; border-radius: 2px;
  }
  .sb-filter-btn.active, .sb-filter-btn:hover {
    background: var(--kaon-orange); border-color: var(--kaon-orange);
    color: var(--kaon-white);
  }

  .sb-list { display: flex; flex-direction: column; gap: 8px; }

  .sb-row {
    display: grid;
    grid-template-columns: 40px 1fr auto 80px;
    align-items: center; gap: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 14px 20px;
    transition: background 0.2s;
    animation: fadeIn 0.25s ease;
  }
  .sb-row:hover { background: rgba(255,255,255,0.07); }
  .sb-row.rank-1 { border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.05); }
  .sb-row.rank-2 { border-color: rgba(192,192,192,0.3); background: rgba(192,192,192,0.04); }
  .sb-row.rank-3 { border-color: rgba(205,127,50,0.3); background: rgba(205,127,50,0.04); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sb-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; text-align: center;
  }
  .sb-rank.gold   { color: #FFD700; }
  .sb-rank.silver { color: #C0C0C0; }
  .sb-rank.bronze { color: #CD7F32; }
  .sb-rank.other  { color: rgba(255,255,255,0.3); font-size: 16px; }

  .sb-name {
    font-size: 15px; font-weight: 700; color: var(--kaon-white);
  }
  .sb-date {
    font-size: 11px; color: rgba(255,255,255,0.3);
    margin-top: 3px; letter-spacing: 0.5px;
  }

  .sb-grade {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 2px; text-align: center;
    white-space: nowrap;
  }
  .grade-master  { background: rgba(255,107,0,0.18); color: var(--kaon-orange); }
  .grade-connect { background: rgba(44,204,113,0.15); color: #2ECC71; }
  .grade-keep    { background: rgba(52,152,219,0.15); color: #3498DB; }
  .grade-try     { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }

  .sb-score-col { text-align: right; }
  .sb-score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; color: var(--kaon-orange); line-height: 1;
  }
  .sb-score-pct { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }

  .sb-clear-wrap { text-align: center; margin-top: 32px; }
  .btn-clear-scores {
    background: transparent; color: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 20px; font-size: 12px; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-clear-scores:hover { color: var(--wrong); border-color: rgba(231,76,60,0.4); }

  /* ── INSTRUCTOR PANEL ── */
  .instructor-toggle {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--kaon-orange); color: var(--kaon-white);
    border: none; width: 52px; height: 52px; border-radius: 50%;
    font-size: 22px; cursor: pointer; z-index: 100;
    box-shadow: 0 4px 20px rgba(255,107,0,0.4);
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .instructor-toggle:hover { transform: scale(1.1); }
  .instructor-panel {
    position: fixed; bottom: 88px; right: 24px; width: 300px;
    background: var(--kaon-dark);
    border: 1px solid rgba(255,107,0,0.3);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    padding: 20px; z-index: 100; display: none; animation: fadeIn 0.2s ease;
  }
  .instructor-panel.open { display: block; }
  .panel-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    letter-spacing: 2px; color: var(--kaon-orange);
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .panel-tip {
    font-size: 12px; line-height: 1.7; color: rgba(255,255,255,0.65);
    margin-bottom: 10px; padding: 10px;
    background: rgba(255,255,255,0.04); border-left: 3px solid var(--kaon-orange);
  }
  .panel-tip strong { color: var(--kaon-white); display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<!-- ── INTRO ── -->

// ── HELPERS ──
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function onNameInput() {
  const val = document.getElementById('nameInput').value.trim();
  document.getElementById('startBtn').disabled = val.length === 0;
}
function onNameKey(e) {
  if (e.key === 'Enter' && document.getElementById('nameInput').value.trim()) startQuiz();
}

// ── QUIZ FLOW ──
function startQuiz() {
  playerName = document.getElementById('nameInput').value.trim();
  if (!playerName) return;
  current = 0; score = 0;
  document.getElementById('quiz-player-name').textContent = playerName;
  renderQuestion();
  show('quiz');
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const pct = Math.round((current / QUESTIONS.length) * 100);
  document.getElementById('prog-text').textContent = `${current + 1} / ${QUESTIONS.length}`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = `${pct}%`;
  document.getElementById('score-num').textContent = score;

  document.getElementById('panel-content').innerHTML =
    `<div class="panel-tip"><strong>Q${current+1} 강사 팁</strong>${q.tip}</div>`;

  document.getElementById('quiz-body').innerHTML = `
    <div class="q-category ${q.catClass}">${q.catLabel}</div>
    <div class="q-number">QUESTION ${current + 1} OF ${QUESTIONS.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options-grid">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectAnswer(${i})">
          <span class="option-num">${i + 1}</span>
          <span>${opt}</span>
        </button>`).join('')}
    </div>
  `;
}

function selectAnswer(idx) {
  const q = QUESTIONS[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = idx === q.answer;
  if (isCorrect) score += 10;

  btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[q.answer].classList.add('correct');

  const fb = document.createElement('div');
  fb.className = `feedback-box ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `
    <div class="feedback-title">${isCorrect ? '✓ 정답입니다!' : '✗ 아쉽네요!'}</div>
    <div class="feedback-text">${q.feedback}</div>
  `;

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn-next';
  nextBtn.textContent = current < QUESTIONS.length - 1 ? 'NEXT QUESTION →' : 'VIEW RESULTS →';
  nextBtn.onclick = () => {
    current++;
    if (current < QUESTIONS.length) renderQuestion();
    else showResult();
  };

  const body = document.getElementById('quiz-body');
  body.appendChild(fb);
  body.appendChild(nextBtn);
  body.scrollTop = body.scrollHeight;
}

function showResult() {
  const pct = Math.round((score / (QUESTIONS.length * 10)) * 100);
  const correct = score / 10;
  const wrong = QUESTIONS.length - correct;

  let grade, gradeKey, msg;
  if (pct >= 90) {
    grade = 'K-ATTITUDE MASTER'; gradeKey = 'master';
    msg = '완벽합니다! KAON의 문화를 완전히 이해했습니다.\n진정한 케티튜드 실천자가 될 준비가 되었어요. 🎉';
  } else if (pct >= 70) {
    grade = 'CONNECTED+'; gradeKey = 'connect';
    msg = '훌륭합니다! 핵심 가치를 잘 이해했어요.\n놓친 부분을 복습하면 완벽해질 거예요.';
  } else if (pct >= 50) {
    grade = 'KEEP GOING'; gradeKey = 'keep';
    msg = '좋은 시작이에요! Culture Deck을 다시 한번\n살펴보고 재도전해보세요.';
  } else {
    grade = 'TRY AGAIN'; gradeKey = 'try';
    msg = '다시 한번 도전해보세요!\nCulture Deck을 꼼꼼히 읽어보는 것을 추천합니다.';
  }

  // Save score
  saveScore(playerName, score, pct, grade, gradeKey);

  document.getElementById('res-player-name').textContent = playerName;
  document.getElementById('res-pct').textContent = pct;
  document.getElementById('res-fraction').textContent = `${correct} / ${QUESTIONS.length}`;
  document.getElementById('res-grade').textContent = grade;
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-ok').textContent = correct;
  document.getElementById('res-no').textContent = wrong;
  document.getElementById('res-score').textContent = score;

  show('result');

  setTimeout(() => {
    const offset = 502 * (1 - pct / 100);
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
  }, 100);
}

function restartQuiz() {
  current = 0; score = 0;
  document.getElementById('quiz-player-name').textContent = playerName;
  renderQuestion();
  show('quiz');
}

// ── SCORE STORAGE ──
function getScores() {
  try { return JSON.parse(localStorage.getItem('kaon_scores') || '[]'); }
  catch { return []; }
}
function saveScore(name, sc, pct, grade, gradeKey) {
  const scores = getScores();
  scores.push({
    name, score: sc, pct, grade, gradeKey,
    date: new Date().toISOString()
  });
  scores.sort((a, b) => b.score - a.score || new Date(b.date) - new Date(a.date));
  localStorage.setItem('kaon_scores', JSON.stringify(scores));
}
function clearScores() {
  if (confirm('모든 스코어 기록을 삭제할까요?')) {
    localStorage.removeItem('kaon_scores');
    renderScoreboard();
  }
}

// ── SCOREBOARD ──
function setSbFilter(f, btn) {
  sbFilter = f;
  document.querySelectorAll('.sb-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderScoreboard();
}

function showScoreboard() {
  sbFilter = 'all';
  document.querySelectorAll('.sb-filter-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  renderScoreboard();
  show('scoreboard');
}

function renderScoreboard() {
  let scores = getScores();

  if (sbFilter === 'today') {
    const today = new Date().toDateString();
    scores = scores.filter(s => new Date(s.date).toDateString() === today);
  } else if (sbFilter === 'top') {
    scores = scores.slice(0, 10);
  }

  const list = document.getElementById('sb-list');

  if (scores.length === 0) {
    list.innerHTML = `
      <div class="sb-empty">
        <div class="sb-empty-icon">📋</div>
        아직 기록이 없습니다.<br>
        퀴즈를 완료하면 여기에 결과가 표시됩니다.
      </div>`;
    return;
  }

  const gradeClassMap = { master:'grade-master', connect:'grade-connect', keep:'grade-keep', try:'grade-try' };
  const rankClass = ['rank-1','rank-2','rank-3'];
  const rankIcon  = ['🥇','🥈','🥉'];
  const rankColor = ['gold','silver','bronze'];

  list.innerHTML = scores.map((s, i) => {
    const rankNum = i + 1;
    const isTop3 = i < 3;
    const dateStr = new Date(s.date).toLocaleDateString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
    return `
      <div class="sb-row ${rankClass[i] || ''}">
        <div class="sb-rank ${isTop3 ? rankColor[i] : 'other'}">
          ${isTop3 ? rankIcon[i] : rankNum}
        </div>
        <div>
          <div class="sb-name">${escHtml(s.name)}</div>
          <div class="sb-date">${dateStr}</div>
        </div>
        <div class="sb-grade ${gradeClassMap[s.gradeKey] || ''}">${s.grade}</div>
        <div class="sb-score-col">
          <div class="sb-score-num">${s.score}</div>
          <div class="sb-score-pct">${s.pct}%</div>
        </div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function togglePanel() {
  document.getElementById('inst-panel').classList.toggle('open');
}
